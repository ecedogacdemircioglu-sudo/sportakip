
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Spor & Kilo Takibi</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#fafafa;color:#222;margin:20px}
.card{background:#fff;border-radius:18px;padding:16px;margin:14px 0;box-shadow:0 2px 10px rgba(0,0,0,.05)}
input,textarea{width:100%;padding:10px;border:1px solid #ddd;border-radius:12px;box-sizing:border-box}
button{background:#f48fb1;border:none;color:#fff;padding:11px 16px;border-radius:12px;margin-top:10px}
label{display:block;margin:6px 0}
#forecast{font-weight:600;color:#d81b60}
pre{white-space:pre-wrap;font-size:12px;background:#f6f6f6;padding:8px;border-radius:10px}
</style>
</head>
<body>
<h2>🏋️ Spor & Kilo Takibi</h2>

<div class="card">
<label>Tarih</label>
<input type="date" id="date" value="2026-07-17" min="2026-07-17">

<label><input type="checkbox" value="Üst Vücut"> Üst Vücut</label>
<label><input type="checkbox" value="Alt Vücut"> Alt Vücut</label>
<label><input type="checkbox" value="Core"> Core</label>
<label><input type="checkbox" value="Kardiyo"> Kardiyo</label>

<label>Kilo</label>
<input type="number" step="0.1" id="weight">

<label>Not</label>
<textarea id="note"></textarea>

<button onclick="save()">Kaydet</button>
</div>

<div class="card">
<h3>10 Gün Tahmini</h3>
<div id="forecast">Yeterli veri yok.</div>
</div>

<div class="card">
<h3>Veriler (ChatGPT'ye Gönder)</h3>
<button onclick="exportData()">JSON Göster</button>
<pre id="out"></pre>
</div>

<script>
let db=JSON.parse(localStorage.getItem("fitnessDB")||"{}");

function load(){
 let d=date.value;
 let x=db[d]||{};
 weight.value=x.weight||"";
 note.value=x.note||"";
 document.querySelectorAll("input[type=checkbox]").forEach(c=>c.checked=(x.workouts||[]).includes(c.value));
 forecast();
}
date.onchange=load;

function save(){
 let workouts=[...document.querySelectorAll("input[type=checkbox]:checked")].map(x=>x.value);
 db[date.value]={weight:parseFloat(weight.value)||null,note:note.value,workouts};
 localStorage.setItem("fitnessDB",JSON.stringify(db));
 forecast();
 alert("Kaydedildi");
}

function forecast(){
 let arr=Object.keys(db).sort().map(d=>({d,w:db[d].weight})).filter(x=>x.w);
 if(arr.length<2){forecast.innerText="Yeterli veri yok.";return;}
 let first=arr[0],last=arr[arr.length-1];
 let days=(new Date(last.d)-new Date(first.d))/86400000;
 if(days<=0){forecast.innerText="Yeterli veri yok.";return;}
 let daily=(last.w-first.w)/days;
 let pred=(last.w+daily*10).toFixed(1);
 forecast.innerText="Bu hızla devam edersen 10 gün sonra yaklaşık "+pred+" kg olursun.";
}

function exportData(){
 out.textContent=JSON.stringify(db,null,2);
}

load();
</script>
</body>
</html>
